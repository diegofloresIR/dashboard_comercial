version: '3.8'

services:
  salesops-dashboard:
    # Utilizamos la imagen compilada automáticamente en GitHub del repositorio del cliente
    image: ghcr.io/diegofloresir/dashboard_comercial:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
      # LAS SIGUIENTES VARIABLES DEBEN CONFIGURARSE EN PORTAINER (SECCIÓN ENVIRONMENT VARIABLES)
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GHL_CLIENT_ID=${GHL_CLIENT_ID}
      - GHL_CLIENT_SECRET=${GHL_CLIENT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_URL=${APP_URL}
      # Opcionales si se usa integración interna
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
      - GHL_API_KEY=${GHL_API_KEY}

    networks:
      - VpsNet
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.salesops.rule=Host(`dashboard.inversionracional.com`)"
        - "traefik.http.routers.salesops.entrypoints=websecure"
        - "traefik.http.routers.salesops.tls=true"
        - "traefik.http.routers.salesops.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.salesops.loadbalancer.server.port=3000"

networks:
  VpsNet:
    external: true
